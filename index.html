<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aetheris — Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-hi: #E2C46B;
  --gold-glow: rgba(201,168,76,0.15);
  --bg: #06060B;
  --surface: #0C0C14;
  --border: rgba(255,255,255,0.07);
  --text: #F0F0F8;
  --muted: #525266;
  --red: #FF4D6D;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}

body {
  background: var(--bg);
  font-family: 'Geist', sans-serif;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* Animated background */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0;
  animation: orbFloat 8s ease-in-out infinite;
}

.orb1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%);
  top: -100px; left: 50%;
  transform: translateX(-50%);
  animation-delay: 0s;
}

.orb2 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(100,80,200,0.07), transparent 70%);
  bottom: 0; right: -50px;
  animation-delay: 3s;
}

@keyframes orbFloat {
  0%{opacity:0;transform:translateX(-50%) translateY(0);}
  20%{opacity:1;}
  50%{transform:translateX(-50%) translateY(-30px);}
  80%{opacity:1;}
  100%{opacity:0;transform:translateX(-50%) translateY(0);}
}

/* Grid overlay */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 48px 48px;
  z-index: 0;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
}

/* Particles */
.particle {
  position: fixed;
  width: 2px; height: 2px;
  background: var(--gold);
  border-radius: 50%;
  opacity: 0;
  animation: particleDrift linear infinite;
  z-index: 0;
}

@keyframes particleDrift {
  0%{opacity:0;transform:translateY(100vh) translateX(0);}
  10%{opacity:0.6;}
  90%{opacity:0.2;}
  100%{opacity:0;transform:translateY(-20px) translateX(40px);}
}

/* Login card */
.login-wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 420px;
  padding: 20px;
  animation: cardReveal 0.9s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes cardReveal {
  from{opacity:0;transform:translateY(32px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.login-card {
  background: rgba(12,12,20,0.85);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 52px 44px 44px;
  backdrop-filter: blur(32px);
  position: relative;
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
}

/* Shimmer top */
.card-shimmer {
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-hi), transparent);
  animation: shimmerPulse 3s ease-in-out infinite;
}

@keyframes shimmerPulse {
  0%,100%{opacity:0.4;left:20%;right:20%;}
  50%{opacity:1;left:10%;right:10%;}
}

/* Inner glow */
.login-card::before {
  content:'';
  position:absolute;
  top:-1px;left:-1px;right:-1px;
  height:200px;
  background: linear-gradient(180deg, var(--gold-glow), transparent);
  pointer-events:none;
  border-radius:28px 28px 0 0;
}

/* Logo */
.logo-area {
  text-align: center;
  margin-bottom: 48px;
  position: relative;
}

.logo-icon {
  width: 64px; height: 64px;
  margin: 0 auto 20px;
  position: relative;
}

.logo-hex {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.4s ease;
}

.logo-icon:hover .logo-hex {
  border-color: rgba(201,168,76,0.6);
  box-shadow: 0 0 30px rgba(201,168,76,0.2);
}

.logo-hex svg {
  width: 28px; height: 28px;
  color: var(--gold);
}

.logo-ring {
  position: absolute;
  inset: -8px;
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 24px;
  animation: ringPulse 2.5s ease-in-out infinite;
}

@keyframes ringPulse {
  0%,100%{transform:scale(1);opacity:0.5;}
  50%{transform:scale(1.05);opacity:1;}
}

.logo-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem;
  font-weight: 300;
  letter-spacing: 6px;
  color: #fff;
  line-height: 1;
}

.logo-sub {
  font-family: 'Geist Mono', monospace;
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 3px;
  margin-top: 8px;
  text-transform: uppercase;
}

/* Fields */
.field-group {
  margin-bottom: 18px;
}

.field-label {
  font-family: 'Geist Mono', monospace;
  font-size: 0.58rem;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 10px;
}

.field-wrap {
  position: relative;
}

.field-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--muted);
  pointer-events: none;
  transition: color 0.2s;
}

.field-input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 15px 18px 15px 46px;
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: all 0.25s ease;
}

.field-input::placeholder { color: rgba(255,255,255,0.12); }

.field-input:focus {
  border-color: rgba(201,168,76,0.4);
  background: rgba(201,168,76,0.03);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.07);
}

.field-wrap:focus-within .field-icon { color: var(--gold); }

/* Login button */
.btn-login {
  width: 100%;
  margin-top: 12px;
  padding: 16px;
  background: linear-gradient(135deg, var(--gold), #A87C28);
  border: none;
  border-radius: 14px;
  color: #0A0806;
  font-family: 'Geist', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

.btn-login::before {
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left 0.5s ease;
}

.btn-login:hover::before { left:100%; }
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(201,168,76,0.3); }
.btn-login:active { transform: translateY(0); }

.btn-login.success {
  background: linear-gradient(135deg, #3DEBA3, #2BB882);
  color: #051A12;
  letter-spacing: 3px;
}

/* Error */
.error-msg {
  display: none;
  margin-top: 16px;
  padding: 12px 16px;
  background: rgba(255,77,109,0.07);
  border: 1px solid rgba(255,77,109,0.2);
  border-radius: 12px;
  font-size: 0.72rem;
  color: var(--red);
  font-family: 'Geist Mono', monospace;
  letter-spacing: 0.5px;
  animation: shake 0.35s ease;
}

@keyframes shake {
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  75%{transform:translateX(6px);}
}

/* Footer */
.card-foot {
  text-align: center;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.card-foot-text {
  font-family: 'Geist Mono', monospace;
  font-size: 0.52rem;
  color: rgba(255,255,255,0.08);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Dots decorations */
.dot-row {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 10px;
}

.dot-dec {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--border);
}

.dot-dec:nth-child(2) { background: rgba(201,168,76,0.3); }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2" style="animation-name:orbFloat2"></div>
</div>
<div class="bg-grid"></div>

<!-- Particles -->
<script>
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(8+Math.random()*12)+'s';
    p.style.animationDelay=(Math.random()*10)+'s';
    p.style.width=p.style.height=(1+Math.random()*2)+'px';
    document.body.appendChild(p);
  }
</script>

<div class="login-wrap">
  <div class="login-card">
    <div class="card-shimmer"></div>

    <div class="logo-area">
      <div class="logo-icon">
        <div class="logo-hex">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l6 2.67V11c0 3.89-2.67 7.54-6 8.93C8.67 18.54 6 14.89 6 11V7.67L12 5zm0 2L8 9v2c0 2.67 1.84 5.16 4 5.93 2.16-.77 4-3.26 4-5.93V9l-4-2z"/></svg>
        </div>
        <div class="logo-ring"></div>
      </div>
      <div class="logo-name">AETHERIS</div>
      <div class="logo-sub">Personnel Intelligence Registry</div>
    </div>

    <div class="field-group">
      <label class="field-label">Username</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <input class="field-input" type="text" id="username" placeholder="Enter username" autocomplete="off">
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Password</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input class="field-input" type="password" id="password" placeholder="Enter password">
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">Access System</button>

    <div class="error-msg" id="errMsg">
      ✕ &nbsp;Invalid credentials — access denied
    </div>

    <div class="card-foot">
      <div class="card-foot-text">Authorized Personnel Only</div>
      <div class="dot-row">
        <div class="dot-dec"></div>
        <div class="dot-dec"></div>
        <div class="dot-dec"></div>
      </div>
    </div>
  </div>
</div>

<script>
const U="admin", P="1234";
document.addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });

function login(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const err=document.getElementById('errMsg');
  const btn=document.getElementById('loginBtn');
  if(u===U && p===P){
    btn.classList.add('success');
    btn.textContent='Identity Verified…';
    setTimeout(()=>window.location.href='dashboard.html', 900);
  } else {
    err.style.display='block';
    err.style.animation='none';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ err.style.animation='shake 0.35s ease'; }));
  }
}
</script>

</body>
</html>
